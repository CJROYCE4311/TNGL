  <rect x="80" y="82" width="488" height="316" rx="40" fill="none" stroke="#0b2341" stroke-width="16"/>

  <text class="title navy" x="678" y="220" font-size="108">SG COUPLES</text>
  <text class="sub navy" x="684" y="309" font-size="50">LEAGUE</text>
