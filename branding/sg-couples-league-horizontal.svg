<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">SG Couples League horizontal logo</title>
  <desc id="desc">A horizontal SG Couples League logo with a Sterling Grove-inspired golf course scene.</desc>
  <defs>
    <linearGradient id="h-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fb7bf"/>
      <stop offset="0.6" stop-color="#f0d28f"/>
      <stop offset="1" stop-color="#f4e6c9"/>
    </linearGradient>
    <linearGradient id="h-fairway" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bb65a"/>
      <stop offset="0.58" stop-color="#547c3b"/>
      <stop offset="1" stop-color="#1e4628"/>
    </linearGradient>
    <clipPath id="h-clip">
      <rect x="80" y="82" width="488" height="316" rx="40"/>
    </clipPath>
    <style>
      :root {
        --navy: #0b2341;
        --cream: #f2e6cf;
        --sand: #d8bf8d;
        --green: #446f37;
        --deep-green: #173922;
        --mountain: #394758;
        --gold: #d89b3a;
      }

      .navy { fill: var(--navy); }
      .cream { fill: var(--cream); }
      .sand { fill: var(--sand); }
      .mountain { fill: var(--mountain); }
      .deep-green { fill: var(--deep-green); }
      .title {
        font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-weight: 900;
        letter-spacing: 5px;
      }
      .sub {
        font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 6px;
      }
    </style>
  </defs>

  <rect class="navy" x="48" y="50" width="552" height="380" rx="58"/>
  <rect class="cream" x="70" y="72" width="508" height="336" rx="48"/>
