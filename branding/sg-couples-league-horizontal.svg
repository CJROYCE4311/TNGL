    <path class="sand" d="M429 322c48-12 83-4 104 24-29 25-69 29-117 13 2-16 6-28 13-37Z"/>
    <path class="deep-green" d="M126 262c-12-38 12-65 44-48 31 17 22 62-14 74-15-5-25-13-30-26Z"/>
    <path class="deep-green" d="M507 262c12-38-12-65-44-48-31 17-22 62 14 74 15-5 25-13 30-26Z"/>
