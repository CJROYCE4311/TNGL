<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">SG Couples League primary logo</title>
  <desc id="desc">A modern badge logo for SG Couples League with a Sterling Grove-inspired Arizona golf course scene.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fb7bf"/>
      <stop offset="0.58" stop-color="#e9c880"/>
      <stop offset="1" stop-color="#f4e2b4"/>
    </linearGradient>
    <linearGradient id="fairway" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9eb95a"/>
      <stop offset="0.48" stop-color="#5f873c"/>
      <stop offset="1" stop-color="#244f2d"/>
    </linearGradient>
    <clipPath id="scene-clip">
      <rect x="240" y="170" width="720" height="560" rx="44"/>
    </clipPath>
    <style>
      :root {
        --navy: #0b2341;
        --cream: #f2e6cf;
        --sand: #d8bf8d;
        --green: #446f37;
        --deep-green: #173922;
        --mountain: #394758;
        --water: #7db4b7;
        --gold: #d89b3a;
      }

      .navy { fill: var(--navy); }
      .cream { fill: var(--cream); }
      .sand { fill: var(--sand); }
      .deep-green { fill: var(--deep-green); }
      .mountain { fill: var(--mountain); }
      .water { fill: var(--water); }
      .gold { fill: var(--gold); }
      .line {
        fill: none;
        stroke: var(--navy);
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .title {
        font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-weight: 900;
        letter-spacing: 6px;
      }
      .sub {
        font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 5px;
      }
    </style>
  </defs>

