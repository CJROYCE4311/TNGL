<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">SG Couples League golf ball mark</title>
  <desc id="desc">A compact SG monogram with mountain and fairway shapes inspired by Sterling Grove.</desc>
  <defs>
    <clipPath id="inner-circle">
      <circle cx="400" cy="400" r="238"/>
    </clipPath>
    <style>
      :root {
        --navy: #0b2341;
        --sand: #d8bf8d;
      }
      .navy { fill: var(--navy); }
      .sand { fill: var(--sand); }
      .stroke-sand {
        fill: none;
        stroke: var(--sand);
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .text {
        font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-weight: 900;
        letter-spacing: 8px;
      }
    </style>
  </defs>

  <circle class="navy" cx="400" cy="400" r="334"/>
  <circle class="sand" cx="400" cy="400" r="286"/>
  <circle class="navy" cx="400" cy="400" r="238"/>
  <g clip-path="url(#inner-circle)">
    <path class="sand" d="M156 323c56-49 104-73 144-73 41 0 65 37 103 37 43 0 75-58 119-58 40 0 64 44 100 44 33 0 61-22 91-22 35 0 72 24 111 72H156Z"/>
    <path class="stroke-sand" stroke-width="22" d="M221 455c48-73 107-109 179-109s131 36 179 109"/>
  </g>
  <text class="text sand" x="407" y="645" font-size="180" text-anchor="middle">SG</text>
</svg>
